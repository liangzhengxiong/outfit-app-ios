name: WhatToWear
options:
  bundleIdPrefix: com.wtw
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: "5.9.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "7.11.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.4.0"

targets:
  WhatToWear:
    type: application
    platform: iOS
    sources:
      - path: WhatToWear
    settings:
      base:
        INFOPLIST_FILE: WhatToWear/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wtw.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: SnapKit
      - package: Alamofire
      - package: Kingfisher
      - package: Lottie
    preBuildScripts: []
    postBuildScripts: []

schemes:
  WhatToWear:
    build:
      targets:
        WhatToWear: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release