name: WhatToWear
options:
  bundleIdPrefix: com.wtw
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  WhatToWear:
    type: application
    platform: iOS
    sources:
      - path: WhatToWear
    settings:
      base:
        INFOPLIST_FILE: WhatToWear/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wtw.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    preBuildScripts: []
    postBuildScripts: []

schemes:
  WhatToWear:
    build:
      targets:
        WhatToWear: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release