app:
  envs:
  - opts:
      is_expand: false
    WORKDIR: .
    BITRISE_APP_DIR: .
format_version: '13'
trigger_map:
- push_branch: master
  workflow: primary
- pull_request_source_branch: "*"
  workflow: primary
workflows:
  primary:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8:
        inputs:
        - repository_url: $GIT_REPOSITORY_URL
        - clone_depth: ''
        - branch: $BITRISE_GIT_BRANCH
    - script:
        inputs:
        - content: |
            #!/bin/bash
            set -ex

            # Install dependencies
            cd services/api
            npm install
            npm run db:generate -- --schema=../../database/schema.prisma

            # Build backend
            npm run build
        name: Backend Setup
    - xcode-archive@5:
        inputs:
        - project_path: apps/ios/project.yml
        - scheme: WhatToWear
        - export_method: development
        - app_dir: $BITRISE_DEPLOY_DIR
        - output_tool: xcode
    - deploy-to-bitrise-io@2: {}
    - create-install-page-ipa@1:
        inputs:
        - ipa_path: $BITRISEIPA_PATH
    meta:
      bitrise.io.platform: ios
