name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Go to iOS project directory
        run: cd apps/ios && ls -la

      - name: Generate Xcode project
        run: |
          cd apps/ios
          npm install -g xcodegen
          npx xcodegen generate

      - name: Install CocoaPods
        run: |
          cd apps/ios
          gem install cocoapods --no-document 2>/dev/null || true
          pod install --verbose 2>&1 | tail -50
          ls -la *.xcworkspace 2>/dev/null || ls -la *.xcodeproj 2>/dev/null

      - name: Build project
        run: |
          cd apps/ios
          xcodebuild clean -workspace WhatToWear.xcworkspace -scheme WhatToWear 2>/dev/null || true
          rm -rf build Payload output
          xcodebuild \
            -workspace WhatToWear.xcworkspace \
            -scheme WhatToWear \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            -archivePath ./build/WhatToWear.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          echo "=== BUILD EXIT CODE: $BUILD_RESULT ==="
          echo "=== CHECKING FOR .xcarchive ==="
          find ./build -name "*.xcarchive" -type d 2>/dev/null || echo "No .xcarchive found"
          if [ "$BUILD_RESULT" != "0" ]; then
            echo "=== BUILD FAILED, UPLOADING LOG ==="
            exit 1
          fi

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: apps/ios/build.log

      - name: Create IPA
        if: success()
        run: |
          cd apps/ios
          mkdir -p Payload output
          echo "=== Looking for .app in xcarchive ==="
          ARCHIVE_PATH=$(find ./build -name "*.xcarchive" -type d 2>/dev/null | head -1)
          echo "Found archive: $ARCHIVE_PATH"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "ERROR: No .xcarchive found"
            ls -la ./build/
            exit 1
          fi
          APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          cd Payload
          zip -r ../output/app.ipa .
          cd ..
          echo "=== IPA created successfully ==="
          ls -la output/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: apps/ios/output/app.ipa
