name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Xcode project
        run: |
          cd apps/ios
          npm install -g xcodegen
          npx xcodegen generate

      - name: Install CocoaPods
        run: |
          cd apps/ios
          pod install

      - name: Build
        run: |
          cd apps/ios
          xcodebuild -workspace WhatToWear.xcworkspace -scheme WhatToWear -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          cd apps/ios
          mkdir -p build output
          xcodebuild -workspace WhatToWear.xcworkspace -scheme WhatToWear -configuration Debug -archivePath build/WhatToWear.xcarchive archive
          xcodebuild -exportArchive -archivePath build/WhatToWear.xcarchive -exportPath output -exportOptionsPlist exportOptions.plist CODE_SIGNING_ALLOWED=NO

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WhatToWear.ipa
          path: apps/ios/output/WhatToWear.ipa

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ~/Library/Logs/DiagnosticReports/
