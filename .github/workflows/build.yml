name: Build iOS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd apps/ios
          if [ -f Package.swift ]; then
            swift package resolve
          fi
          if [ -f Podfile ]; then
            pod install --repo-update
          fi

      - name: Generate Xcode project
        run: |
          cd apps/ios
          npx xcodegen generate

      - name: Build
        run: |
          cd apps/ios
          xcodebuild -project WhatToWear.xcodeproj -scheme WhatToWear -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          cd apps/ios
          xcodebuild -project WhatToWear.xcodeproj -scheme WhatToWear -configuration Debug -archivePath build/WhatToWear.xcarchive archive
          xcodebuild -exportArchive -archivePath build/WhatToWear.xcarchive -exportPath output -exportOptionsPlist exportOptions.plist CODE_SIGNING_ALLOWED=NO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhatToWear.ipa
          path: apps/ios/output/WhatToWear.ipa

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ~/Library/Logs/DiagnosticReports/
