name: Build iOS IPA
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Go to iOS project directory
        run: cd apps/ios && ls -la

      - name: Build project (log to file)
        run: |
          cd apps/ios
          xcodebuild \
            -workspace WhatToWear.xcworkspace \
            -scheme WhatToWear \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: apps/ios/build.log

      - name: Create IPA (simulator build only)
        if: success()
        run: |
          cd apps/ios
          mkdir -p Payload
          cp -r build/Debug-iphonesimulator/*.app Payload/
          zip -r app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: apps/ios/app.ipa
