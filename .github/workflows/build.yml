name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Go to iOS project directory
        run: cd apps/ios && ls -la

      - name: Generate Xcode project
        run: |
          cd apps/ios
          npm install -g xcodegen
          npx xcodegen generate

      - name: Install CocoaPods
        run: |
          cd apps/ios
          pod install

      - name: Build project
        run: |
          cd apps/ios
          xcodebuild \
            -workspace WhatToWear.xcworkspace \
            -scheme WhatToWear \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath ./build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee build.log || true
          echo "=== BUILD OUTPUT STRUCTURE ==="
          find ./build -type d -name "*.app" 2>/dev/null || echo "No .app found"
          echo "=== DIRECTORY LISTING ==="
          ls -laR ./build 2>/dev/null | head -50

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: apps/ios/build.log

      - name: Create IPA
        if: success()
        run: |
          cd apps/ios
          mkdir -p Payload output
          APP_PATH=$(find ./build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build directory"
            ls -la ./build/Build/Products/
            exit 1
          fi
          echo "Found app: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          cd Payload
          zip -r ../output/app.ipa .
          cd ..

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: apps/ios/output/app.ipa
